<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <title>{% block title %}{% endblock %}</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --bg-card: #141414;
            --bg-hover: #1e1e1e;
            --border: #222222;
            --border-light: #2a2a2a;
            --text-primary: #e8e8e8;
            --text-secondary: #888888;
            --text-muted: #555555;
            --accent: #ffffff;
            --green: #22c55e;
            --green-dim: rgba(34,197,94,0.15);
            --red: #ef4444;
            --red-dim: rgba(239,68,68,0.15);
            --yellow: #eab308;
            --yellow-dim: rgba(234,179,8,0.15);
            --blue: #3b82f6;
            --radius: 10px;
            --radius-sm: 6px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-w: 220px;
            --font: 'Inter', -apple-system, sans-serif;
        }

        html, body {
            height: 100%; font-family: var(--font); font-size: 14px;
            background: var(--bg-primary); color: var(--text-primary);
            -webkit-font-smoothing: antialiased; overflow: hidden;
        }

        /* ── Sidebar ──────────────────────────── */
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: var(--sidebar-w); background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            z-index: 100; transition: transform 0.3s ease;
        }
        .sidebar.collapsed { transform: translateX(-100%); }

        .sidebar-logo {
            padding: 20px; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-logo img { width: 32px; height: 32px; border-radius: 8px; }
        .sidebar-logo span {
            font-weight: 600; font-size: 15px; letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        .sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }

        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border-radius: var(--radius-sm);
            color: var(--text-secondary); text-decoration: none;
            font-size: 13px; font-weight: 500; transition: all var(--transition);
            position: relative; cursor: pointer;
        }
        .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .nav-item.active { background: var(--bg-tertiary); color: var(--accent); }
        .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

        .nav-badge {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            min-width: 18px; height: 18px; padding: 0 5px;
            background: var(--red); color: #fff; border-radius: 9px;
            font-size: 10px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-badge.hidden { display: none; }

        /* ── Hamburger ────────────────────────── */
        .hamburger {
            position: fixed; top: 14px; left: 14px; z-index: 200;
            width: 36px; height: 36px; border-radius: var(--radius-sm);
            background: var(--bg-secondary); border: 1px solid var(--border);
            display: none; align-items: center; justify-content: center;
            cursor: pointer; transition: all var(--transition);
        }
        .hamburger:hover { background: var(--bg-hover); }
        .hamburger svg { width: 18px; height: 18px; color: var(--text-primary); }

        /* ── Main Content ─────────────────────── */
        .main {
            margin-left: var(--sidebar-w); height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .main-content { flex: 1; overflow-y: auto; padding: 24px; }

        /* ── Overlay ──────────────────────────── */
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 90; display: none; backdrop-filter: blur(2px);
        }

        /* ── Popup / Modal ────────────────────── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 500; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.visible { display: flex; }

        .modal {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 24px;
            min-width: 320px; max-width: 440px; width: 90%;
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(8px); } }

        .modal-title {
            font-size: 15px; font-weight: 600; margin-bottom: 12px;
            color: var(--text-primary);
        }
        .modal-body { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

        /* ── Buttons ──────────────────────────── */
        .btn {
            padding: 8px 16px; border-radius: var(--radius-sm);
            font-family: var(--font); font-size: 12px; font-weight: 500;
            border: 1px solid var(--border); background: var(--bg-tertiary);
            color: var(--text-primary); cursor: pointer;
            transition: all var(--transition); display: inline-flex;
            align-items: center; gap: 6px; white-space: nowrap;
        }
        .btn:hover { background: var(--bg-hover); border-color: var(--border-light); }
        .btn:active { transform: scale(0.97); }

        .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn-primary:hover { background: #ddd; }

        .btn-danger { background: var(--red-dim); color: var(--red); border-color: rgba(239,68,68,0.3); }
        .btn-danger:hover { background: rgba(239,68,68,0.25); }

        .btn-success { background: var(--green-dim); color: var(--green); border-color: rgba(34,197,94,0.3); }
        .btn-success:hover { background: rgba(34,197,94,0.25); }

        .btn-sm { padding: 5px 10px; font-size: 11px; }
        .btn-icon { padding: 6px; min-width: 30px; justify-content: center; }
        .btn svg { width: 14px; height: 14px; }

        /* ── Toast ─────────────────────────────── */
        .toast-container {
            position: fixed; top: 16px; right: 16px; z-index: 600;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 10px 16px; border-radius: var(--radius-sm);
            font-size: 12px; font-weight: 500;
            background: var(--bg-secondary); border: 1px solid var(--border);
            color: var(--text-primary); min-width: 200px;
            animation: toastIn 0.3s ease;
            display: flex; align-items: center; gap: 8px;
        }
        .toast.success { border-color: rgba(34,197,94,0.4); }
        .toast.error { border-color: rgba(239,68,68,0.4); }
        .toast.warning { border-color: rgba(234,179,8,0.4); }
        @keyframes toastIn { from { opacity:0; transform: translateX(20px); } }

        .toast-dot {
            width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
        }
        .toast.success .toast-dot { background: var(--green); }
        .toast.error .toast-dot { background: var(--red); }
        .toast.warning .toast-dot { background: var(--yellow); }

        /* ── Responsive ───────────────────────── */
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.visible { display: block; }
            .main { margin-left: 0; }
            .main-content { padding: 16px; padding-top: 60px; }
        }

        /* ── Scrollbar ────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<!-- Hamburger (mobile) -->
<button class="hamburger" id="hamburger" onclick="toggleSidebar()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
</button>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <img src="/assets/logo.png" alt="Logo" onerror="this.style.display='none'">
        <span>PHAMDAT SELFBOT</span>
    </div>
    <div class="sidebar-nav">
        <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Dashboard
        </a>
        <a href="/captcha" class="nav-item {% if request.path == '/captcha' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Captcha
            <span class="nav-badge hidden" id="captchaBadge">0</span>
        </a>
        <a href="/data" class="nav-item {% if request.path == '/data' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Data
        </a>
    </div>
</nav>

<!-- Main -->
<div class="main">
    <div class="main-content" id="mainContent">
        {% block content %}{% endblock %}
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal">
        <div class="modal-title" id="confirmTitle"></div>
        <div class="modal-body" id="confirmBody"></div>
        <div class="modal-actions">
            <button class="btn" onclick="closeConfirm()">Cancel</button>
            <button class="btn btn-primary" id="confirmOk">Confirm</button>
        </div>
    </div>
</div>

<!-- Notification Modal -->
<div class="modal-overlay" id="notifModal">
    <div class="modal">
        <div class="modal-title">Enable Notifications</div>
        <div class="modal-body">Allow notifications to receive alerts when a captcha appears while the site is in the background.</div>
        <div class="modal-actions">
            <button class="btn" onclick="closeNotifModal()">Skip</button>
            <button class="btn btn-primary" onclick="requestNotif()">Allow</button>
        </div>
    </div>
</div>

<script>
    // ── SocketIO ──
    const socket = io();

    socket.on('captcha_count', data => {
        const badge = document.getElementById('captchaBadge');
        if (badge) {
            badge.textContent = data.count;
            badge.classList.toggle('hidden', data.count === 0);
        }
    });

    // ── Browser Notifications & Audio ──
    function closeNotifModal() {
        document.getElementById('notifModal').classList.remove('visible');
    }

    function requestNotif() {
        if ('Notification' in window) {
            Notification.requestPermission().then(perm => {
                if (perm === 'granted') showToast('Notifications enabled', 'success');
            });
        }
        closeNotifModal();
    }

    if ('Notification' in window && Notification.permission === 'default') {
        document.getElementById('notifModal').classList.add('visible');
    }

    socket.on('notification', data => {
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification(data.title, { body: data.body, tag: data.tag, icon: '/assets/logo.png' });
        }
        new Audio('/assets/notification.mp3').play().catch(() => {});
    });

    // ── Sidebar Toggle (mobile) ──
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('visible');
    }

    // ── Toast ──
    function showToast(msg, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span class="toast-dot"></span>${msg}`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; }, 2500);
        setTimeout(() => toast.remove(), 2800);
    }

    // ── Confirm Modal ──
    let _confirmCb = null;

    function showConfirm(title, body, onConfirm) {
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmBody').textContent = body;
        document.getElementById('confirmModal').classList.add('visible');
        _confirmCb = onConfirm;
    }

    function closeConfirm() {
        document.getElementById('confirmModal').classList.remove('visible');
        _confirmCb = null;
    }

    document.getElementById('confirmOk').onclick = () => {
        if (_confirmCb) _confirmCb();
        closeConfirm();
    };

    // ── API Helper ──
    async function api(url, method = 'GET', body = null) {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(url, opts);
        return res.json();
    }
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
